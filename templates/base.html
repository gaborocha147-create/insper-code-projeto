<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ICC{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.body.classList.add("fade-in");

  const links = document.querySelectorAll("a[href]");

  links.forEach(link => {
    link.addEventListener("click", function (e) {
      const url = this.getAttribute("href");

      if (url && !url.startsWith("#") && !url.startsWith("http")) {
        e.preventDefault();
        document.body.classList.remove("fade-in");
        document.body.classList.add("fade-out");

        setTimeout(() => {
          window.location.href = url;
        }, 400);
      }
    });
  });
});
</script>

<body>

<header>
  <nav class="barra_de_cima">
    <div class="logo">
        Insper Consulting Club
    </div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Início</a>
      <a href="{{ url_for('atividades') }}">Atividades</a>
      <a href="{{ url_for('equipe') }}">Equipe</a>
      <a href="{{ url_for('parceiros') }}">Parceiros</a>
      <a href="{{ url_for('participe') }}">Participe</a>
      <a href="{{ url_for('contato') }}">Contato</a>
    </div>
  </nav>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer>
  <div class="container">
    © Insper Consulting Club
  </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const carousel = document.querySelector(".carousel");
  const nextBtn = document.querySelector(".carousel-btn.next");
  const prevBtn = document.querySelector(".carousel-btn.prev");

  if (carousel && nextBtn && prevBtn) {

    const slide = document.querySelector(".member-slide");
    const slideWidth = slide.offsetWidth + 60; // largura + gap

    nextBtn.addEventListener("click", () => {
      carousel.scrollBy({
        left: slideWidth,
        behavior: "smooth"
      });
    });

    prevBtn.addEventListener("click", () => {
      carousel.scrollBy({
        left: -slideWidth,
        behavior: "smooth"
      });
    });

  }

});
</script>

</body>
</html>
